name: Deploy GitHub Pages

# Publica o app (PWA) no GitHub Pages.
# Requer que, em Settings > Pages, a "Source" esteja definida como "GitHub Actions".
# O passo configure-pages tenta habilitar o Pages automaticamente (enablement: true).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante uma única publicação por vez, sem cancelar uma em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
